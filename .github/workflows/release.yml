name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Lint & format check
        run: pnpm lint && pnpm format:check

      - name: Type check
        run: pnpm check

      - name: Frontend tests
        run: pnpm test

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Rust format check
        run: cargo fmt --check
        working-directory: src-tauri

      - name: Rust clippy
        run: cargo clippy -- -D warnings
        working-directory: src-tauri

      - name: Rust tests
        run: cargo test
        working-directory: src-tauri

      - uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        with:
          tagName: v__VERSION__
          releaseName: v__VERSION__
          releaseBody: 'See the [CHANGELOG](https://github.com/wkdev/glide/blob/main/CHANGELOG.md) for details.'
          releaseDraft: true
          prerelease: false
          updaterJsonPreferNsis: true

      - name: Create MSIX package
        shell: pwsh
        env:
          MSIX_PUBLISHER: ${{ secrets.MSIX_PUBLISHER }}
        run: |
          $version    = (Get-Content package.json | ConvertFrom-Json).version
          $msixVer    = "$version.0"
          $publisher  = if ($env:MSIX_PUBLISHER) { $env:MSIX_PUBLISHER } else { 'CN=Glide' }
          $stagingDir = 'msix_staging'
          $outDir     = 'src-tauri/target/release/bundle/msix'
          $pkgName    = "Glide_${version}_x64.msix"

          New-Item -ItemType Directory -Force -Path "$stagingDir/Assets" | Out-Null
          New-Item -ItemType Directory -Force -Path $outDir             | Out-Null

          Copy-Item 'src-tauri/target/release/glide.exe' "$stagingDir/"

          @(
            'Square30x30Logo.png',  'Square44x44Logo.png',  'Square71x71Logo.png',
            'Square89x89Logo.png',  'Square107x107Logo.png', 'Square142x142Logo.png',
            'Square150x150Logo.png', 'Square284x284Logo.png', 'Square310x310Logo.png',
            'StoreLogo.png'
          ) | ForEach-Object { Copy-Item "src-tauri/icons/$_" "$stagingDir/Assets/$_" }

          (Get-Content '.github/AppxManifest.xml' -Raw)
            .Replace('{{PUBLISHER}}', $publisher)
            .Replace('{{VERSION}}',   $msixVer) |
            Set-Content "$stagingDir/AppxManifest.xml" -Encoding utf8NoBOM

          $sdkBin = Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin' -Directory |
                    Where-Object  { $_.Name -match '^\d+\.\d+\.\d+\.\d+$' } |
                    Sort-Object   Name -Descending |
                    Select-Object -First 1 -ExpandProperty FullName
          if (-not $sdkBin) { Write-Error 'Windows SDK not found'; exit 1 }
          $env:Path += ";$sdkBin\x64"

          Write-Host "SDK: $sdkBin"
          makeappx.exe pack /v /o /d $stagingDir /p "$outDir/$pkgName"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Write-Host "MSIX created: $outDir/$pkgName"

      - name: Upload MSIX to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $pkg     = "src-tauri/target/release/bundle/msix/Glide_${version}_x64.msix"
          gh release upload '${{ github.ref_name }}' $pkg --clobber

      - name: Generate checksums
        shell: pwsh
        run: |
          $dirs = @(
            "src-tauri/target/release/bundle/nsis",
            "src-tauri/target/release/bundle/msi",
            "src-tauri/target/release/bundle/msix"
          )

          $sha256Lines = @()
          $md5Lines    = @()

          foreach ($dir in $dirs) {
            if (Test-Path $dir) {
              Get-ChildItem $dir -File |
                Where-Object { $_.Extension -in @('.exe', '.msi', '.msix') } |
                ForEach-Object {
                  $sha256 = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
                  $md5    = (Get-FileHash $_.FullName -Algorithm MD5).Hash.ToLower()
                  $sha256Lines += "$sha256  $($_.Name)"
                  $md5Lines    += "$md5  $($_.Name)"
                }
            }
          }

          ($sha256Lines -join "`n") | Set-Content SHA256SUMS.txt -Encoding utf8
          ($md5Lines    -join "`n") | Set-Content MD5SUMS.txt    -Encoding utf8
          Write-Host 'SHA256SUMS.txt:' && Get-Content SHA256SUMS.txt
          Write-Host 'MD5SUMS.txt:'    && Get-Content MD5SUMS.txt

      - name: Sign checksums with GPG
        if: ${{ secrets.GPG_PRIVATE_KEY != '' }}
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        shell: pwsh
        run: |
          $env:GPG_PRIVATE_KEY | Out-File "$env:TEMP\gpg_key.asc" -Encoding ascii -NoNewline
          gpg --batch --import "$env:TEMP\gpg_key.asc"
          Remove-Item "$env:TEMP\gpg_key.asc"
          $env:GPG_PASSPHRASE | gpg --batch --yes --pinentry-mode loopback `
            --passphrase-fd 0 --armor --detach-sign SHA256SUMS.txt

      - name: Upload checksums to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $assets = @('SHA256SUMS.txt', 'MD5SUMS.txt')
          if (Test-Path 'SHA256SUMS.txt.asc') { $assets += 'SHA256SUMS.txt.asc' }
          gh release upload '${{ github.ref_name }}' @assets --clobber
