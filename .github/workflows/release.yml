name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      HAS_GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate signing secrets
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          $failed = $false

          # --- Tauri signing key ---
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY) {
            Write-Error '::error::TAURI_SIGNING_PRIVATE_KEY secret is empty or missing'
            $failed = $true
          } else {
            Write-Host '✅ TAURI_SIGNING_PRIVATE_KEY is set'
          }

          # --- GPG key import + passphrase test ---
          if ($env:GPG_PRIVATE_KEY) {
            $raw = $env:GPG_PRIVATE_KEY
            if ($raw -notmatch '-----BEGIN') {
              try { $raw = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($raw)) }
              catch { Write-Host 'GPG key is not base64, using as-is' }
            }
            $keyFile = Join-Path $env:TEMP 'gpg_validate.asc'
            [System.IO.File]::WriteAllText($keyFile, $raw)
            $importOut = gpg --batch --import $keyFile 2>&1
            Remove-Item $keyFile -ErrorAction SilentlyContinue

            if ($LASTEXITCODE -ne 0) {
              Write-Error "::error::GPG key import failed: $importOut"
              $failed = $true
            } else {
              Write-Host '✅ GPG key imported successfully'

              # test-sign a dummy payload to verify passphrase
              'validate' | Out-File (Join-Path $env:TEMP 'gpg_test.txt') -Encoding utf8
              $signOut = gpg --batch --yes --pinentry-mode loopback --passphrase $env:GPG_PASSPHRASE --armor --detach-sign (Join-Path $env:TEMP 'gpg_test.txt') 2>&1
              $signExit = $LASTEXITCODE
              Remove-Item (Join-Path $env:TEMP 'gpg_test.txt'), (Join-Path $env:TEMP 'gpg_test.txt.asc') -ErrorAction SilentlyContinue

              if ($signExit -ne 0) {
                Write-Error "::error::GPG passphrase verification failed — check GPG_PASSPHRASE secret: $signOut"
                $failed = $true
              } else {
                Write-Host '✅ GPG passphrase verified (test-sign succeeded)'
              }
            }
          } else {
            Write-Host '⚠️ GPG_PRIVATE_KEY not set — checksum signing will be skipped'
          }

          if ($failed) { exit 1 }

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Lint & format check
        run: pnpm lint && pnpm format:check

      - name: Type check
        run: pnpm check

      - name: Frontend tests
        run: pnpm test

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Rust format check
        run: cargo fmt --check
        working-directory: src-tauri

      - name: Rust clippy
        run: cargo clippy -- -D warnings
        working-directory: src-tauri

      - name: Rust tests
        run: cargo test
        working-directory: src-tauri

      - uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        with:
          tagName: v__VERSION__
          releaseName: v__VERSION__
          releaseBody: 'See the [CHANGELOG](https://github.com/wkdev/glide/blob/main/CHANGELOG.md) for details.'
          releaseDraft: true
          prerelease: false
          updaterJsonPreferNsis: true

      - name: Create MSIX package
        shell: pwsh
        env:
          MSIX_PUBLISHER: ${{ secrets.MSIX_PUBLISHER }}
          MSIX_IDENTITY_NAME: ${{ secrets.MSIX_IDENTITY_NAME }}
          MSIX_PUBLISHER_DISPLAY_NAME: ${{ secrets.MSIX_PUBLISHER_DISPLAY_NAME }}
        run: |
          $version              = (Get-Content package.json | ConvertFrom-Json).version
          $msixVer              = "$version.0"
          $publisher            = if ($env:MSIX_PUBLISHER) { $env:MSIX_PUBLISHER } else { 'CN=Glide' }
          $identityName         = if ($env:MSIX_IDENTITY_NAME) { $env:MSIX_IDENTITY_NAME } else { 'com.wkdev.glide' }
          $publisherDisplayName = if ($env:MSIX_PUBLISHER_DISPLAY_NAME) { $env:MSIX_PUBLISHER_DISPLAY_NAME } else { 'wkdev' }
          $stagingDir = 'msix_staging'
          $outDir     = 'src-tauri/target/release/bundle/msix'
          $pkgName    = "Glide_${version}_x64.msix"

          New-Item -ItemType Directory -Force -Path "$stagingDir/Assets" | Out-Null
          New-Item -ItemType Directory -Force -Path $outDir             | Out-Null

          Copy-Item 'src-tauri/target/release/glide.exe' "$stagingDir/"

          @(
            'Square30x30Logo.png',  'Square44x44Logo.png',  'Square71x71Logo.png',
            'Square89x89Logo.png',  'Square107x107Logo.png', 'Square142x142Logo.png',
            'Square150x150Logo.png', 'Square284x284Logo.png', 'Square310x310Logo.png',
            'StoreLogo.png'
          ) | ForEach-Object { Copy-Item "src-tauri/icons/$_" "$stagingDir/Assets/$_" }

          $manifest = Get-Content '.github/AppxManifest.xml' -Raw
          $manifest = $manifest.Replace('{{PUBLISHER}}', $publisher).Replace('{{VERSION}}', $msixVer)
          $manifest = $manifest.Replace('{{IDENTITY_NAME}}', $identityName)
          $manifest = $manifest.Replace('{{PUBLISHER_DISPLAY_NAME}}', $publisherDisplayName)
          $manifest | Set-Content "$stagingDir/AppxManifest.xml" -Encoding utf8NoBOM

          $sdkBin = Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin' -Directory |
                    Where-Object  { $_.Name -match '^\d+\.\d+\.\d+\.\d+$' } |
                    Sort-Object   Name -Descending |
                    Select-Object -First 1 -ExpandProperty FullName
          if (-not $sdkBin) { Write-Error 'Windows SDK not found'; exit 1 }
          $env:Path += ";$sdkBin\x64"

          Write-Host "SDK: $sdkBin"
          makeappx.exe pack /v /o /d $stagingDir /p "$outDir/$pkgName"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Write-Host "MSIX created: $outDir/$pkgName"

      - name: Upload MSIX to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $pkg     = "src-tauri/target/release/bundle/msix/Glide_${version}_x64.msix"
          gh release upload '${{ github.ref_name }}' $pkg --clobber

      - name: Generate checksums
        shell: pwsh
        run: |
          $dirs = @(
            "src-tauri/target/release/bundle/nsis",
            "src-tauri/target/release/bundle/msi",
            "src-tauri/target/release/bundle/msix"
          )

          $sha256Lines = @()
          $md5Lines    = @()

          foreach ($dir in $dirs) {
            if (Test-Path $dir) {
              Get-ChildItem $dir -File |
                Where-Object { $_.Extension -in @('.exe', '.msi', '.msix') } |
                ForEach-Object {
                  $sha256 = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
                  $md5    = (Get-FileHash $_.FullName -Algorithm MD5).Hash.ToLower()
                  $sha256Lines += "$sha256  $($_.Name)"
                  $md5Lines    += "$md5  $($_.Name)"
                }
            }
          }

          ($sha256Lines -join "`n") | Set-Content SHA256SUMS.txt -Encoding utf8
          ($md5Lines    -join "`n") | Set-Content MD5SUMS.txt    -Encoding utf8
          Write-Host 'SHA256SUMS.txt:' && Get-Content SHA256SUMS.txt
          Write-Host 'MD5SUMS.txt:'    && Get-Content MD5SUMS.txt

      - name: Sign checksums with GPG
        if: ${{ env.HAS_GPG_KEY == 'true' }}
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        shell: pwsh
        run: |
          $raw = $env:GPG_PRIVATE_KEY
          if ($raw -notmatch '-----BEGIN') {
            try { $raw = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($raw)) }
            catch { }
          }
          $keyFile = Join-Path $env:TEMP 'gpg_key.asc'
          [System.IO.File]::WriteAllText($keyFile, $raw)
          gpg --batch --import $keyFile
          Remove-Item $keyFile
          gpg --batch --yes --pinentry-mode loopback --passphrase $env:GPG_PASSPHRASE --armor --detach-sign SHA256SUMS.txt

      - name: Upload checksums to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $assets = @('SHA256SUMS.txt', 'MD5SUMS.txt')
          if (Test-Path 'SHA256SUMS.txt.asc') { $assets += 'SHA256SUMS.txt.asc' }
          gh release upload '${{ github.ref_name }}' @assets --clobber

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit '${{ github.ref_name }}' --draft=false
